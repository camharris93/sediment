version: 2

models:
  - name: stg_anage
    description: >
      Staged AnAge database records — one row per species entry, covering
      taxonomy, life-history traits (maturity, gestation, weaning, litter size,
      longevity), body size, metabolic rate, and Gompertz mortality parameters.
      Junk rows (questionable quality + no longevity) are filtered out at staging.
      All units are preserved from the source and documented per column.
    columns:
      - name: hagrid
        description: >
          AnAge unique species identifier (zero-padded 5-digit varchar).
          Primary key of this table.
        tests:
          - not_null
          - unique

      - name: common_name
        description: Common English name of the species. Unique in the source profile.
        tests:
          - not_null
          - unique

      - name: scientific_name
        description: >
          Derived binomial name (Genus + Species concatenated). Not independently
          tested for uniqueness — genus/species alone are not unique across the dataset.
        tests:
          - not_null

      - name: kingdom
        description: Taxonomic kingdom. Low cardinality (~3 values observed).
        tests:
          - not_null
          - accepted_values:
              values: ['Animalia', 'Fungi', 'Plantae', 'Monera']

      - name: phylum
        description: Taxonomic phylum.
        tests:
          - not_null

      - name: class
        description: Taxonomic class.
        tests:
          - not_null

      - name: taxon_order
        description: Taxonomic order (renamed from ORDER to avoid SQL reserved word).
        tests:
          - not_null

      - name: family
        description: Taxonomic family.
        tests:
          - not_null

      - name: genus
        description: Taxonomic genus.
        tests:
          - not_null

      - name: species
        description: Taxonomic species epithet (not unique alone).
        tests:
          - not_null

      - name: specimen_origin
        description: Whether the longevity record comes from a wild or captive specimen.
        tests:
          - not_null
          - accepted_values:
              values: ['wild', 'captivity', 'unknown']

      - name: sample_size
        description: Ordinal descriptor of sample size underlying the record.
        tests:
          - not_null
          - accepted_values:
              values: ['tiny', 'small', 'medium', 'large', 'huge']

      - name: data_quality
        description: Editorial quality flag assigned by AnAge curators.
        tests:
          - not_null
          - accepted_values:
              values: ['questionable', 'low', 'acceptable', 'high']

      - name: female_maturity_days
        description: Age at female sexual maturity, in days. ~47% null.

      - name: male_maturity_days
        description: Age at male sexual maturity, in days. ~59% null.

      - name: gestation_incubation_days
        description: Gestation (mammals) or incubation (birds/reptiles) duration, in days. ~61% null.

      - name: weaning_days
        description: Age at weaning, in days. ~83% null — mammals only in practice.

      - name: interbirth_interval_days
        description: Inter-litter or interbirth interval, in days. ~84% null.

      - name: litter_clutch_size
        description: >
          Mean number of offspring per litter or clutch. DOUBLE — some species
          (e.g., fish) have values in the hundreds of millions; validate before
          aggregating. ~55% null.

      - name: litters_clutches_per_year
        description: Mean number of litters or clutches per year. ~72% null.

      - name: birth_weight_g
        description: Birth weight in grams. ~74% null.

      - name: weaning_weight_g
        description: Weaning weight in grams. ~92% null.

      - name: adult_weight_g
        description: Adult body weight in grams. ~21% null — best-covered size metric.

      - name: body_mass_g
        description: >
          Body mass in grams used for metabolic rate measurement (may differ from
          adult_weight_g). ~87% null — present only when metabolic_rate_w is also present.

      - name: growth_rate_per_day
        description: Intrinsic growth rate constant (1/days). ~88% null.

      - name: maximum_longevity_yrs
        description: Maximum recorded longevity in years. ~11% null — core AnAge trait.

      - name: imr_per_yr
        description: >
          Initial Mortality Rate (Gompertz intercept), per year. ~99% null —
          available only for a small subset of well-studied species.

      - name: mrdt_yrs
        description: >
          Mortality Rate Doubling Time (Gompertz slope inverse), in years. ~99% null.
          A value of 999 is used in the source to indicate negligible actuarial aging.

      - name: metabolic_rate_w
        description: Basal/resting metabolic rate in Watts. ~87% null.

      - name: temperature_k
        description: Body or ambient temperature during metabolic measurement, in Kelvin. ~89% null.

      - name: source_ref
        description: Primary source reference ID for the longevity record. ~12% null.

      - name: references_raw
        description: >
          Comma-separated list of reference IDs supporting all trait values.
          Nearly complete (~0.02% null). Not parsed at staging — left as raw string.
