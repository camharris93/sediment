version: 2

# Per-dataset raw landing zones written by `engine/ingest.py`. Each dataset gets
# its OWN source block (source name = dataset, schema = <dataset>_raw), so two
# datasets' same-named tables never collide. New datasets append a block here
# automatically via `scaffold --write`.
sources:
  - name: anage
    schema: anage_raw
    description: "Raw landing tables for the anage dataset (engine/ingest.py)."
    tables:
      - name: anage
        description: "AnAge animal ageing & longevity records, exactly as downloaded (tab-delimited)."
